apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx
      env:
      - name: FILE_PATH
        valueFrom:
          configMapKeyRef:
              name: notes-config
              key: FILE_PATH
        ports:
        - containerPort: 80
        volumeMounts:
        - name: nginx-storage
          mountPath: /usr/share/nginx/html   # 👈 important
      volumes:
      - name: nginx-storage
        persistentVolumeClaim:
          claimName: nginx-pvc
