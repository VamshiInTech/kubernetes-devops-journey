name: CI Pipeline - Notes App

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Show files
      run: ls -la

    - name: Build Docker Image
      run: docker build -t notes-app:ci ./app

    - name: Run container (test)
      run: docker run -d -p 5000:5000 notes-app:ci

    - name: Verify app running
      run: curl http://localhost:5000
